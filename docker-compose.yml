version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: social_marketing
      POSTGRES_USER: ${DB_USER:-social}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-social_dev_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-social}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  admin-bot:
    build: .
    command: python -m src.admin_bot.bot
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_storage:/app/media
    restart: unless-stopped

  generation-worker:
    build: .
    command: python -m src.workers.generation_worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_storage:/app/media
    restart: unless-stopped

  publish-worker:
    build: .
    command: python -m src.workers.publish_worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_storage:/app/media
    restart: unless-stopped

  video-worker:
    build: .
    command: python -m src.workers.video_worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_storage:/app/media
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  token-refresher:
    build: .
    command: python -m src.workers.token_refresh_worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  media_storage:
